<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Abdullah Hussain capability constellation</title>
  <desc id="desc">An ornamental map of capabilities spanning filmmaking, creative AI, computer vision, software, three-dimensional design, and visual communication.</desc>
  <defs>
    <pattern id="tile" width="84" height="84" patternUnits="userSpaceOnUse">
      <path d="M42 3 81 42 42 81 3 42Z M42 19 65 42 42 65 19 42Z" fill="none" stroke="#174e57" stroke-width="1"/>
    </pattern>
    <g id="smallstar">
      <path d="M0-23 7-9 23-9 11 2 15 19 0 11-15 19-11 2-23-9-7-9Z" fill="#c89b3c" stroke="#f0dfb5" stroke-width="1.5"/>
      <circle r="4" fill="#dc6148"/>
    </g>
    <g id="terminal">
      <rect x="-72" y="-38" width="144" height="76" rx="7" fill="#07111f" stroke="#52c5b8" stroke-width="2"/>
      <circle cx="-54" cy="-23" r="3" fill="#dc6148"/>
      <circle cx="-43" cy="-23" r="3" fill="#c89b3c"/>
      <path d="m-52-4 13 10-13 10M-31 16h20" fill="none" stroke="#f0dfb5" stroke-width="3"/>
    </g>
  </defs>
  <rect width="1200" height="760" fill="#07111f"/>
  <rect x="14" y="14" width="1172" height="732" fill="none" stroke="#c89b3c" stroke-width="3"/>
  <rect x="26" y="26" width="1148" height="708" fill="url(#tile)" opacity=".28"/>

  <text x="600" y="69" text-anchor="middle" fill="#f0dfb5" font-family="Georgia, serif" font-size="34" font-weight="700" letter-spacing="5">A PRACTICE ACROSS DISCIPLINES</text>
  <text x="600" y="98" text-anchor="middle" fill="#52c5b8" font-family="'Courier New', monospace" font-size="13" letter-spacing="3">FILM • INTELLIGENCE • SOFTWARE • FORM • EXPERIENCE</text>

  <!-- Network wiring -->
  <g fill="none" stroke="#286d71" stroke-width="2">
    <path d="M600 380 330 200M600 380 600 178M600 380 870 200M600 380 930 380M600 380 870 560M600 380 600 584M600 380 330 560M600 380 270 380"/>
    <path d="M330 200 600 178 870 200 930 380 870 560 600 584 330 560 270 380Z" stroke="#c89b3c"/>
  </g>

  <!-- Center -->
  <g transform="translate(600 380)">
    <circle r="148" fill="#102d3d" stroke="#c89b3c" stroke-width="4"/>
    <circle r="131" fill="#0a1828" stroke="#52c5b8" stroke-width="2"/>
    <path d="M0-120 31-74 85-85 74-31 120 0 74 31 85 85 31 74 0 120-31 74-85 85-74 31-120 0-74-31-85-85-31-74Z" fill="#153e70" stroke="#dc6148" stroke-width="3"/>
    <circle r="62" fill="#187168" stroke="#f0dfb5" stroke-width="2"/>
    <text y="-10" text-anchor="middle" fill="#f0dfb5" font-family="Georgia, serif" font-size="27" font-weight="700">CREATIVE</text>
    <text y="25" text-anchor="middle" fill="#f0dfb5" font-family="Georgia, serif" font-size="27" font-weight="700">ENGINEERING</text>
    <text y="53" text-anchor="middle" fill="#e7b44b" font-family="'Courier New', monospace" font-size="11" letter-spacing="2">ART × SYSTEMS</text>
  </g>

  <!-- Capability medallions -->
  <g font-family="'Courier New', monospace" text-anchor="middle">
    <g transform="translate(330 200)">
      <circle r="91" fill="#102d3d" stroke="#e7b44b" stroke-width="3"/>
      <circle r="78" fill="#07111f" stroke="#187168" stroke-width="2"/>
      <path d="M-38-12h76v45h-76zM-26-12v-18h52v18M-18 33v15M18 33v15M-34 48h68" fill="none" stroke="#dc6148" stroke-width="3"/>
      <text y="67" fill="#f0dfb5" font-size="14" font-weight="700">FILMMAKING</text>
      <text y="84" fill="#52c5b8" font-size="9">EDIT • GRADE • PRODUCE</text>
    </g>
    <g transform="translate(600 178)">
      <circle r="91" fill="#102d3d" stroke="#e7b44b" stroke-width="3"/>
      <circle r="78" fill="#07111f" stroke="#187168" stroke-width="2"/>
      <g fill="none" stroke="#52c5b8" stroke-width="2">
        <circle cy="-17" r="12"/><circle cx="-32" cy="9" r="9"/><circle cx="32" cy="9" r="9"/><circle cy="35" r="9"/>
        <path d="M-9-9-26 3M9-9 26 3M-27 17-7 31M27 17 7 31M-24 9h48"/>
      </g>
      <text y="67" fill="#f0dfb5" font-size="14" font-weight="700">CREATIVE AI</text>
      <text y="84" fill="#52c5b8" font-size="9">MULTIMODAL • GENERATIVE</text>
    </g>
    <g transform="translate(870 200)">
      <circle r="91" fill="#102d3d" stroke="#e7b44b" stroke-width="3"/>
      <circle r="78" fill="#07111f" stroke="#187168" stroke-width="2"/>
      <path d="M-54 5C-23-29 23-29 54 5-23 39-23 39-54 5Z" fill="none" stroke="#52c5b8" stroke-width="3"/>
      <circle cy="5" r="20" fill="#153e70" stroke="#dc6148" stroke-width="3"/>
      <circle cy="5" r="7" fill="#e7b44b"/>
      <text y="67" fill="#f0dfb5" font-size="14" font-weight="700">COMPUTER VISION</text>
      <text y="84" fill="#52c5b8" font-size="9">CLASSIFY • UNDERSTAND</text>
    </g>
    <g transform="translate(930 380)">
      <circle r="91" fill="#102d3d" stroke="#e7b44b" stroke-width="3"/>
      <circle r="78" fill="#07111f" stroke="#187168" stroke-width="2"/>
      <path d="M0-43 39-20v44L0 47-39 24v-44Z M0-43V2m39-22L0 2-39-20M0 2v45" fill="none" stroke="#52c5b8" stroke-width="3"/>
      <text y="67" fill="#f0dfb5" font-size="14" font-weight="700">3D &amp; SPATIAL</text>
      <text y="84" fill="#52c5b8" font-size="9">MODEL • RENDER • DESIGN</text>
    </g>
    <g transform="translate(870 560)">
      <circle r="91" fill="#102d3d" stroke="#e7b44b" stroke-width="3"/>
      <circle r="78" fill="#07111f" stroke="#187168" stroke-width="2"/>
      <use href="#terminal"/>
      <text y="67" fill="#f0dfb5" font-size="14" font-weight="700">SOFTWARE CRAFT</text>
      <text y="84" fill="#52c5b8" font-size="9">PYTHON • WEB • TOOLS</text>
    </g>
    <g transform="translate(600 584)">
      <circle r="91" fill="#102d3d" stroke="#e7b44b" stroke-width="3"/>
      <circle r="78" fill="#07111f" stroke="#187168" stroke-width="2"/>
      <path d="M-52 24h104M-42 24V-21h20v45M-10 24v-61h20v61M22 24V-6h20v30" fill="none" stroke="#52c5b8" stroke-width="3"/>
      <circle cx="-32" cy="-31" r="7" fill="#dc6148"/><circle cy="-47" r="7" fill="#e7b44b"/><circle cx="32" cy="-16" r="7" fill="#187168"/>
      <text y="67" fill="#f0dfb5" font-size="14" font-weight="700">ML ENGINEERING</text>
      <text y="84" fill="#52c5b8" font-size="9">TRAIN • EVALUATE • ITERATE</text>
    </g>
    <g transform="translate(330 560)">
      <circle r="91" fill="#102d3d" stroke="#e7b44b" stroke-width="3"/>
      <circle r="78" fill="#07111f" stroke="#187168" stroke-width="2"/>
      <path d="M-48-29h96v58h-96zM-28 42h56M0 29v13" fill="none" stroke="#52c5b8" stroke-width="3"/>
      <path d="m-30 9 18-17 17 12 19-22 16 15" fill="none" stroke="#dc6148" stroke-width="3"/>
      <text y="67" fill="#f0dfb5" font-size="14" font-weight="700">PRODUCT PROTOTYPES</text>
      <text y="84" fill="#52c5b8" font-size="9">INTERFACE • EXPERIENCE</text>
    </g>
    <g transform="translate(270 380)">
      <circle r="91" fill="#102d3d" stroke="#e7b44b" stroke-width="3"/>
      <circle r="78" fill="#07111f" stroke="#187168" stroke-width="2"/>
      <circle cy="-5" r="39" fill="#153e70" stroke="#f0dfb5" stroke-width="2"/>
      <path d="M0-44v78M-39-5h78M-28-33 28 23M28-33-28 23" stroke="#dc6148" stroke-width="3"/>
      <circle cy="-5" r="10" fill="#e7b44b"/>
      <text y="67" fill="#f0dfb5" font-size="14" font-weight="700">VISUAL DESIGN</text>
      <text y="84" fill="#52c5b8" font-size="9">COLOR • FORM • STORY</text>
    </g>
  </g>

  <g>
    <use href="#smallstar" transform="translate(85 85)"/>
    <use href="#smallstar" transform="translate(1115 85)"/>
    <use href="#smallstar" transform="translate(85 675)"/>
    <use href="#smallstar" transform="translate(1115 675)"/>
  </g>
</svg>
