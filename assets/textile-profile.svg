<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Abdullah Hussain — Creative AI Engineer, Filmmaker, 3D Designer</title>
  <desc id="desc">A red-thread embroidered profile artwork on natural linen, with cinematic, artificial intelligence, code, and three-dimensional design motifs.</desc>
  <defs>
    <pattern id="linen" width="18" height="18" patternUnits="userSpaceOnUse">
      <rect width="18" height="18" fill="#e8dfce"/>
      <path d="M0 3H18M0 9H18M0 15H18" stroke="#c9bda8" stroke-width=".55" opacity=".7"/>
      <path d="M3 0V18M10 0V18M16 0V18" stroke="#f5eee1" stroke-width=".7" opacity=".8"/>
      <path d="M0 0 18 18M18 0 0 18" stroke="#baa991" stroke-width=".22" opacity=".35"/>
    </pattern>
    <pattern id="crosses" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M4 4 16 16M16 4 4 16" stroke="#922827" stroke-width="2.4" stroke-linecap="round"/>
    </pattern>
    <pattern id="smallCrosses" width="12" height="12" patternUnits="userSpaceOnUse">
      <path d="M3 3 9 9M9 3 3 9" stroke="#6b2020" stroke-width="1.6" stroke-linecap="round"/>
    </pattern>
    <pattern id="diamonds" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M21 3 39 21 21 39 3 21Z M21 11 31 21 21 31 11 21Z" fill="none" stroke="#8c2524" stroke-width="2"/>
      <circle cx="21" cy="21" r="2.5" fill="#4e1a1a"/>
    </pattern>
    <pattern id="teeth" width="24" height="14" patternUnits="userSpaceOnUse">
      <path d="M0 13 6 3 12 13 18 3 24 13" fill="none" stroke="#8c2524" stroke-width="2.2"/>
    </pattern>
    <g id="x">
      <path d="M-5-5 5 5M5-5-5 5" stroke="#922827" stroke-width="2.2" stroke-linecap="round"/>
    </g>
    <g id="knot">
      <path d="M0-19 19 0 0 19-19 0Z M0-9 9 0 0 9-9 0Z" fill="none" stroke="#922827" stroke-width="3"/>
      <circle r="2.5" fill="#4e1a1a"/>
    </g>
  </defs>

  <rect width="1200" height="620" fill="url(#linen)"/>

  <!-- Uneven hand-stitched outer frame -->
  <path d="M23 22H1174V594H28V25" fill="none" stroke="#6b2020" stroke-width="3" stroke-dasharray="2 7" stroke-linecap="round"/>
  <path d="M36 37H1160V579H41V41" fill="none" stroke="#a33935" stroke-width="1.8" stroke-dasharray="10 5 2 5"/>
  <rect x="48" y="48" width="1104" height="32" fill="url(#crosses)"/>
  <rect x="48" y="540" width="1104" height="32" fill="url(#crosses)"/>

  <!-- Embroidered side panels -->
  <g>
    <rect x="58" y="95" width="176" height="428" fill="#ded2bf" stroke="#6b2020" stroke-width="2"/>
    <rect x="69" y="106" width="154" height="406" fill="url(#diamonds)" stroke="#9a302d" stroke-width="2"/>
    <rect x="82" y="119" width="128" height="380" fill="url(#smallCrosses)" opacity=".55"/>
    <path d="M82 161H210M82 252H210M82 343H210M82 434H210" stroke="#6b2020" stroke-width="3"/>
    <rect x="966" y="95" width="176" height="428" fill="#ded2bf" stroke="#6b2020" stroke-width="2"/>
    <rect x="977" y="106" width="154" height="406" fill="url(#diamonds)" stroke="#9a302d" stroke-width="2"/>
    <rect x="990" y="119" width="128" height="380" fill="url(#smallCrosses)" opacity=".55"/>
    <path d="M990 161H1118M990 252H1118M990 343H1118M990 434H1118" stroke="#6b2020" stroke-width="3"/>
  </g>

  <!-- Center textile placket -->
  <path d="M323 95H877V523H323Z" fill="#eee5d6" stroke="#6b2020" stroke-width="2"/>
  <rect x="337" y="109" width="526" height="400" fill="none" stroke="#a33935" stroke-width="2" stroke-dasharray="4 5"/>
  <rect x="352" y="124" width="496" height="36" fill="url(#teeth)"/>
  <rect x="352" y="468" width="496" height="36" fill="url(#teeth)" transform="rotate(180 600 486)"/>

  <!-- Identity -->
  <text x="600" y="218" text-anchor="middle" fill="#4e1a1a" font-family="Georgia, serif" font-size="48" font-weight="700" letter-spacing="5">ABDULLAH HUSSAIN</text>
  <path d="M396 242H804" stroke="#922827" stroke-width="2.5" stroke-dasharray="2 7" stroke-linecap="round"/>
  <text x="600" y="274" text-anchor="middle" fill="#7d2523" font-family="'Courier New', monospace" font-size="15" font-weight="700" letter-spacing="2">CREATIVE AI ENGINEER • FILMMAKER • 3D DESIGNER</text>

  <!-- Modern technical marks translated into stitch -->
  <g fill="none" stroke="#8c2524" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- film frame -->
    <rect x="382" y="313" width="102" height="78"/>
    <path d="M397 313v78M469 313v78M382 327h102M382 377h102"/>
    <path d="m411 351 18-14 18 14-18 14Z"/>
    <!-- neural/circuit -->
    <circle cx="600" cy="348" r="16"/>
    <circle cx="548" cy="319" r="9"/><circle cx="652" cy="319" r="9"/>
    <circle cx="548" cy="379" r="9"/><circle cx="652" cy="379" r="9"/>
    <path d="M586 340 557 324M614 340l29-16M586 356l-29 18M614 356l29 18"/>
    <!-- code/cube -->
    <path d="m717 329-20 19 20 19M759 329l20 19-20 19M745 318l-15 60"/>
  </g>
  <g>
    <use href="#x" transform="translate(364 301)"/><use href="#x" transform="translate(500 301)"/>
    <use href="#x" transform="translate(364 405)"/><use href="#x" transform="translate(500 405)"/>
    <use href="#x" transform="translate(530 301)"/><use href="#x" transform="translate(670 301)"/>
    <use href="#x" transform="translate(530 405)"/><use href="#x" transform="translate(670 405)"/>
    <use href="#x" transform="translate(692 301)"/><use href="#x" transform="translate(804 301)"/>
    <use href="#x" transform="translate(692 405)"/><use href="#x" transform="translate(804 405)"/>
  </g>
  <text x="433" y="430" text-anchor="middle" fill="#4e1a1a" font-family="'Courier New', monospace" font-size="12" font-weight="700">FILM / COLOR</text>
  <text x="600" y="430" text-anchor="middle" fill="#4e1a1a" font-family="'Courier New', monospace" font-size="12" font-weight="700">AI / VISION</text>
  <text x="748" y="430" text-anchor="middle" fill="#4e1a1a" font-family="'Courier New', monospace" font-size="12" font-weight="700">CODE / FORM</text>

  <!-- Sparse modern wire crossing the textile -->
  <path d="M235 192h48v-61h39M878 131h40v61h48M235 449h58v49h29M878 498h36v-49h52" fill="none" stroke="#3c5355" stroke-width="2" stroke-dasharray="7 5"/>
  <circle cx="283" cy="192" r="5" fill="#e8dfce" stroke="#3c5355" stroke-width="2"/>
  <circle cx="918" cy="192" r="5" fill="#e8dfce" stroke="#3c5355" stroke-width="2"/>
  <circle cx="293" cy="449" r="5" fill="#e8dfce" stroke="#3c5355" stroke-width="2"/>
  <circle cx="914" cy="449" r="5" fill="#e8dfce" stroke="#3c5355" stroke-width="2"/>

  <!-- Center knot -->
  <use href="#knot" transform="translate(600 486) scale(.8)"/>
</svg>
