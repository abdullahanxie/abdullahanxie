<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="390" viewBox="0 0 1200 390" role="img" aria-labelledby="title desc">
  <title id="title">The camera trained my eye. Code expanded what it can build.</title>
  <desc id="desc">A dark-grid visual connecting cinematic craft and engineering craft.</desc>
  <defs>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M36 0H0V36" fill="none" stroke="#313831" stroke-width="1"/></pattern>
    <linearGradient id="signal" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#d7ff45"/><stop offset="1" stop-color="#59c3ff"/></linearGradient>
  </defs>
  <rect width="1200" height="390" rx="20" fill="#0d0f0e"/>
  <rect width="1200" height="390" rx="20" fill="url(#grid)" opacity=".7"/>
  <text x="48" y="48" fill="#8e918b" font-family="'Courier New', monospace" font-size="12" letter-spacing="2">CAREER BRIDGE / TWO DISCIPLINES, ONE EYE</text>
  <text x="1152" y="48" text-anchor="end" fill="#d7ff45" font-family="'Courier New', monospace" font-size="12" letter-spacing="2">● SHARED SIGNAL</text>

  <g transform="translate(215 190)">
    <circle r="93" fill="#151816" stroke="#596158" stroke-width="2"/>
    <circle r="68" fill="none" stroke="#d7ff45" stroke-width="2"/>
    <circle r="20" fill="#ff6b4a"/>
    <path d="M0-20V-63M17-10l38-22M17 10l38 22M0 20v43M-17 10l-38 22M-17-10l-38-22" stroke="#e8e2d7" stroke-width="2"/>
    <text y="128" text-anchor="middle" fill="#e8e2d7" font-family="'Courier New', monospace" font-size="17">CINEMATIC CRAFT</text>
  </g>

  <g transform="translate(985 190)">
    <rect x="-96" y="-72" width="192" height="144" rx="9" fill="#151816" stroke="#59c3ff" stroke-width="2"/>
    <circle cx="-72" cy="-49" r="4" fill="#ff6b4a"/><circle cx="-58" cy="-49" r="4" fill="#d7ff45"/><circle cx="-44" cy="-49" r="4" fill="#59c3ff"/>
    <path d="m-59-15 22 18-22 18m37 0h34M26-15h43M26 3h26M26 21h37" fill="none" stroke="#e8e2d7" stroke-width="3" stroke-linecap="round"/>
    <text y="128" text-anchor="middle" fill="#e8e2d7" font-family="'Courier New', monospace" font-size="17">ENGINEERING CRAFT</text>
  </g>

  <path d="M309 190h41M850 190h41" stroke="#596158" stroke-width="2"/>
  <circle cx="330" cy="190" r="7" fill="#151816" stroke="#d7ff45" stroke-width="2"/>
  <circle cx="870" cy="190" r="7" fill="#151816" stroke="#d7ff45" stroke-width="2"/>

  <g transform="translate(600 192)">
    <rect x="-250" y="-100" width="500" height="200" rx="12" fill="#151816" stroke="url(#signal)" stroke-width="3"/>
    <text y="-35" text-anchor="middle" fill="#e8e2d7" font-family="Arial, sans-serif" font-size="29" font-weight="800">THE CAMERA TRAINED MY EYE.</text>
    <text y="8" text-anchor="middle" fill="#d7ff45" font-family="Arial, sans-serif" font-size="29" font-weight="800">CODE EXPANDED</text>
    <text y="48" text-anchor="middle" fill="#d7ff45" font-family="Arial, sans-serif" font-size="29" font-weight="800">WHAT IT CAN BUILD.</text>
    <text y="78" text-anchor="middle" fill="#8e918b" font-family="'Courier New', monospace" font-size="11" letter-spacing="2">COMPOSITION × SYSTEMS × EXPERIENCE</text>
  </g>
  <rect x="1" y="1" width="1198" height="388" rx="19" fill="none" stroke="#454d44" stroke-width="2"/>
</svg>
