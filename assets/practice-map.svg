<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">One practice across disciplines</title>
  <desc id="desc">A dark-grid capability map connecting filmmaking, creative AI, computer vision, spatial design, software, and product craft.</desc>
  <defs>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#313831" stroke-width="1"/>
    </pattern>
    <linearGradient id="signal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d7ff45"/><stop offset="1" stop-color="#59c3ff"/>
    </linearGradient>
    <g id="node"><circle r="7" fill="#151816" stroke="#d7ff45" stroke-width="2"/><circle r="2" fill="#59c3ff"/></g>
  </defs>
  <rect width="1200" height="650" rx="20" fill="#0d0f0e"/>
  <rect width="1200" height="650" rx="20" fill="url(#grid)" opacity=".7"/>
  <text x="48" y="52" fill="#8e918b" font-family="'Courier New', monospace" font-size="12" letter-spacing="2">PRACTICE MAP / CAPABILITIES IN PARALLEL</text>
  <text x="1152" y="52" text-anchor="end" fill="#d7ff45" font-family="'Courier New', monospace" font-size="12" letter-spacing="2">06 ACTIVE SIGNALS</text>
  <text x="48" y="112" fill="#e8e2d7" font-family="Arial, sans-serif" font-size="54" font-weight="800" letter-spacing="-3">ONE PRACTICE.</text>
  <text x="48" y="166" fill="#d7ff45" font-family="Arial, sans-serif" font-size="54" font-weight="800" letter-spacing="-3">MANY INSTRUMENTS.</text>

  <!-- connection field -->
  <g fill="none" stroke="#596158" stroke-width="1.5">
    <path d="M600 382 250 260M600 382 600 240M600 382 950 260M600 382 950 505M600 382 600 530M600 382 250 505"/>
    <path d="M250 260 600 240 950 260 950 505 600 530 250 505Z" stroke-dasharray="6 8"/>
  </g>
  <g>
    <use href="#node" transform="translate(425 321)"/><use href="#node" transform="translate(600 311)"/>
    <use href="#node" transform="translate(775 321)"/><use href="#node" transform="translate(775 444)"/>
    <use href="#node" transform="translate(600 456)"/><use href="#node" transform="translate(425 444)"/>
  </g>

  <!-- center -->
  <g transform="translate(600 382)">
    <circle r="104" fill="#151816" stroke="#d7ff45" stroke-width="3"/>
    <circle r="84" fill="none" stroke="#596158" stroke-width="1.5" stroke-dasharray="4 7"/>
    <path d="M0-62 17-26 57-34 31 0 57 34 17 26 0 62-17 26-57 34-31 0-57-34-17-26Z" fill="none" stroke="#59c3ff" stroke-width="2"/>
    <text y="-8" text-anchor="middle" fill="#e8e2d7" font-family="Arial, sans-serif" font-size="24" font-weight="800">CREATIVE</text>
    <text y="22" text-anchor="middle" fill="#d7ff45" font-family="Arial, sans-serif" font-size="24" font-weight="800">ENGINEERING</text>
    <text y="49" text-anchor="middle" fill="#8e918b" font-family="'Courier New', monospace" font-size="10" letter-spacing="2">IMAGE × LOGIC</text>
  </g>

  <!-- six capability cards -->
  <g font-family="'Courier New', monospace">
    <g transform="translate(105 210)">
      <rect width="290" height="100" rx="8" fill="#151816" stroke="#596158"/>
      <path d="M22 23h43v35H22zm0 9h43M36 23v35M51 23v35" fill="none" stroke="#ff6b4a" stroke-width="1.5"/>
      <text x="82" y="34" fill="#8e918b" font-size="10">01 / VISUAL LANGUAGE</text>
      <text x="82" y="59" fill="#e8e2d7" font-size="18">FILMMAKING</text>
      <text x="22" y="84" fill="#8e918b" font-size="10">EDIT • COLOR • MOTION • STORY</text>
    </g>
    <g transform="translate(455 190)">
      <rect width="290" height="100" rx="8" fill="#151816" stroke="#596158"/>
      <g fill="none" stroke="#59c3ff" stroke-width="1.5"><circle cx="43" cy="36" r="10"/><circle cx="22" cy="60" r="6"/><circle cx="64" cy="60" r="6"/><path d="m36 44-10 11m24-11 10 11"/></g>
      <text x="82" y="34" fill="#8e918b" font-size="10">02 / INTELLIGENT MEDIA</text>
      <text x="82" y="59" fill="#e8e2d7" font-size="18">CREATIVE AI</text>
      <text x="22" y="84" fill="#8e918b" font-size="10">GENERATE • EXPERIMENT • DIRECT</text>
    </g>
    <g transform="translate(805 210)">
      <rect width="290" height="100" rx="8" fill="#151816" stroke="#596158"/>
      <path d="M17 47c17-23 48-23 65 0-17 23-48 23-65 0Z" fill="none" stroke="#d7ff45" stroke-width="1.5"/><circle cx="50" cy="47" r="10" fill="none" stroke="#59c3ff" stroke-width="1.5"/>
      <text x="98" y="34" fill="#8e918b" font-size="10">03 / MACHINE PERCEPTION</text>
      <text x="98" y="59" fill="#e8e2d7" font-size="18">COMPUTER VISION</text>
      <text x="22" y="84" fill="#8e918b" font-size="10">CLASSIFY • UNDERSTAND • MEASURE</text>
    </g>
    <g transform="translate(805 455)">
      <rect width="290" height="100" rx="8" fill="#151816" stroke="#596158"/>
      <path d="M50 17 78 33v33L50 82 22 66V33Zm0 0v33m28-17L50 50 22 33m28 17v32" fill="none" stroke="#d7ff45" stroke-width="1.5"/>
      <text x="98" y="34" fill="#8e918b" font-size="10">04 / SPATIAL THINKING</text>
      <text x="98" y="59" fill="#e8e2d7" font-size="18">3D + DESIGN</text>
      <text x="22" y="84" fill="#8e918b" font-size="10">FORM • MATERIAL • LIGHT • SPACE</text>
    </g>
    <g transform="translate(455 480)">
      <rect width="290" height="100" rx="8" fill="#151816" stroke="#596158"/>
      <path d="m25 39 15 12-15 12m26 0h24M91 33h36M91 48h23M91 63h31" fill="none" stroke="#59c3ff" stroke-width="2" stroke-linecap="round"/>
      <text x="145" y="34" fill="#8e918b" font-size="10">05 / BUILDING SYSTEMS</text>
      <text x="145" y="59" fill="#e8e2d7" font-size="18">SOFTWARE CRAFT</text>
      <text x="22" y="84" fill="#8e918b" font-size="10">PYTHON • WEB • AUTOMATION • TOOLS</text>
    </g>
    <g transform="translate(105 455)">
      <rect width="290" height="100" rx="8" fill="url(#signal)"/>
      <path d="M22 68h58M29 68V32h14v36m10 0V20h14v48" fill="none" stroke="#132015" stroke-width="2"/>
      <text x="98" y="34" fill="#183026" font-size="10">06 / APPLIED EXPERIENCE</text>
      <text x="98" y="59" fill="#0d0f0e" font-size="18" font-weight="700">PRODUCT CRAFT</text>
      <text x="22" y="84" fill="#183026" font-size="10">PROTOTYPE • POLISH • SHIP • LEARN</text>
    </g>
  </g>
  <rect x="1" y="1" width="1198" height="648" rx="19" fill="none" stroke="#454d44" stroke-width="2"/>
</svg>
