<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Abdullah Hussain capability textile</title>
  <desc id="desc">A modern capability map rendered as red embroidery on natural woven linen.</desc>
  <defs>
    <pattern id="linen" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="#e9e0d0"/>
      <path d="M0 3H16M0 8H16M0 13H16M3 0V16M9 0V16M14 0V16" stroke="#c4b7a2" stroke-width=".45" opacity=".65"/>
    </pattern>
    <pattern id="cross" width="14" height="14" patternUnits="userSpaceOnUse">
      <path d="M3 3 11 11M11 3 3 11" stroke="#8b2726" stroke-width="2" stroke-linecap="round"/>
    </pattern>
    <pattern id="border" width="48" height="32" patternUnits="userSpaceOnUse">
      <path d="M24 2 46 16 24 30 2 16Z M24 9 35 16 24 23 13 16Z" fill="none" stroke="#8b2726" stroke-width="2"/>
      <circle cx="24" cy="16" r="2" fill="#4e1919"/>
    </pattern>
    <g id="stitchNode">
      <circle r="6" fill="#e9e0d0" stroke="#3d5555" stroke-width="2"/>
      <path d="M-3-3 3 3M3-3-3 3" stroke="#8b2726" stroke-width="1.5"/>
    </g>
  </defs>
  <rect width="1200" height="720" fill="url(#linen)"/>
  <path d="M20 20H1180V700H20Z" fill="none" stroke="#6a2020" stroke-width="3" stroke-dasharray="3 7"/>
  <rect x="34" y="34" width="1132" height="42" fill="url(#border)"/>
  <rect x="34" y="644" width="1132" height="42" fill="url(#border)"/>

  <text x="600" y="128" text-anchor="middle" fill="#4e1919" font-family="Georgia, serif" font-size="38" font-weight="700" letter-spacing="4">ONE PRACTICE, MANY INSTRUMENTS</text>
  <text x="600" y="157" text-anchor="middle" fill="#8b2726" font-family="'Courier New', monospace" font-size="13" font-weight="700" letter-spacing="3">IMAGE • INTELLIGENCE • SOFTWARE • SPACE • STORY</text>

  <!-- Asymmetric modern-art field -->
  <rect x="73" y="205" width="312" height="382" fill="#ded2bf" stroke="#6a2020" stroke-width="2"/>
  <rect x="405" y="205" width="315" height="180" fill="#eee6d9" stroke="#8b2726" stroke-width="2"/>
  <rect x="740" y="205" width="387" height="180" fill="#ded2bf" stroke="#6a2020" stroke-width="2"/>
  <rect x="405" y="405" width="222" height="182" fill="#ded2bf" stroke="#6a2020" stroke-width="2"/>
  <rect x="647" y="405" width="235" height="182" fill="#eee6d9" stroke="#8b2726" stroke-width="2"/>
  <rect x="902" y="405" width="225" height="182" fill="#ded2bf" stroke="#6a2020" stroke-width="2"/>

  <!-- Film panel -->
  <g transform="translate(229 350)" fill="none" stroke="#8b2726" stroke-width="3" stroke-linecap="round">
    <circle cy="-42" r="60"/><circle cy="-42" r="39"/><circle cy="-42" r="12"/>
    <path d="M0-54V-93M0-30 34-11M0-30-34-11M-34-72 0-54 34-72"/>
    <path d="M-106 48H106M-91 48v38M-46 48v38M0 48v38M46 48v38M91 48v38"/>
  </g>
  <text x="229" y="487" text-anchor="middle" fill="#4e1919" font-family="Georgia, serif" font-size="24" font-weight="700">FILMMAKING</text>
  <text x="229" y="515" text-anchor="middle" fill="#8b2726" font-family="'Courier New', monospace" font-size="11" font-weight="700">EDIT / COLOR / MOTION / STORY</text>
  <rect x="93" y="542" width="272" height="25" fill="url(#cross)"/>

  <!-- AI panel -->
  <g transform="translate(557 263)" fill="none" stroke="#8b2726" stroke-width="3">
    <circle r="14"/><circle cx="-61" cy="-22" r="9"/><circle cx="61" cy="-22" r="9"/><circle cx="-61" cy="38" r="9"/><circle cx="61" cy="38" r="9"/>
    <path d="M-13-5-52-19M13-5 52-19M-13 8-52 35M13 8 52 35"/>
  </g>
  <text x="557" y="341" text-anchor="middle" fill="#4e1919" font-family="Georgia, serif" font-size="20" font-weight="700">CREATIVE AI + VISION</text>
  <text x="557" y="365" text-anchor="middle" fill="#8b2726" font-family="'Courier New', monospace" font-size="9" font-weight="700">GENERATE / CLASSIFY / EVALUATE</text>

  <!-- 3D panel -->
  <g transform="translate(935 260) scale(.78)" fill="none" stroke="#8b2726" stroke-width="3">
    <path d="M0-62 57-29v66L0 70-57 37v-66Z M0-62v66M57-29 0 4-57-29M0 4v66"/>
  </g>
  <text x="935" y="341" text-anchor="middle" fill="#4e1919" font-family="Georgia, serif" font-size="19" font-weight="700">3D + ENGINEERING DESIGN</text>
  <text x="935" y="365" text-anchor="middle" fill="#8b2726" font-family="'Courier New', monospace" font-size="9" font-weight="700">FORM / MATERIAL / LIGHT / SPACE</text>

  <!-- Software panel -->
  <g transform="translate(516 477)" fill="none" stroke="#8b2726" stroke-width="3" stroke-linecap="round">
    <rect x="-73" y="-42" width="146" height="85"/>
    <path d="m-43-12 18 15-18 15M-9 18h28M29-12h28M29 3h17M29 18h25"/>
  </g>
  <text x="516" y="552" text-anchor="middle" fill="#4e1919" font-family="Georgia, serif" font-size="18" font-weight="700">SOFTWARE CRAFT</text>
  <text x="516" y="574" text-anchor="middle" fill="#8b2726" font-family="'Courier New', monospace" font-size="9" font-weight="700">PYTHON / WEB / AUTOMATION</text>

  <!-- ML panel -->
  <g transform="translate(765 477)" fill="none" stroke="#8b2726" stroke-width="3">
    <path d="M-72 39H72M-55 39V-13h24v52M-12 39v-76h24v76M31 39V1h24v38"/>
    <circle cx="-43" cy="-25" r="7" fill="#8b2726"/><circle cy="-49" r="7" fill="#8b2726"/><circle cx="43" cy="-11" r="7" fill="#8b2726"/>
  </g>
  <text x="765" y="552" text-anchor="middle" fill="#4e1919" font-family="Georgia, serif" font-size="20" font-weight="700">ML ENGINEERING</text>
  <text x="765" y="574" text-anchor="middle" fill="#8b2726" font-family="'Courier New', monospace" font-size="9" font-weight="700">TRAIN / MEASURE / ITERATE</text>

  <!-- Product panel -->
  <g transform="translate(1015 476)" fill="none" stroke="#8b2726" stroke-width="3">
    <rect x="-72" y="-46" width="144" height="88"/>
    <path d="M-55-25h110M-52 25l31-28 26 17 35-40M-20 42v15M20 42v15M-38 57h76"/>
  </g>
  <text x="1015" y="552" text-anchor="middle" fill="#4e1919" font-family="Georgia, serif" font-size="16" font-weight="700">PRODUCT PROTOTYPES</text>
  <text x="1015" y="574" text-anchor="middle" fill="#8b2726" font-family="'Courier New', monospace" font-size="9" font-weight="700">INTERFACE / EXPERIENCE / POLISH</text>

  <!-- Circuit thread connecting panels -->
  <path d="M385 350h20M720 306h20M720 350h20M627 496h20M882 496h20" fill="none" stroke="#3d5555" stroke-width="2.2" stroke-dasharray="8 5"/>
  <g>
    <use href="#stitchNode" transform="translate(395 350)"/>
    <use href="#stitchNode" transform="translate(730 306)"/><use href="#stitchNode" transform="translate(730 350)"/>
    <use href="#stitchNode" transform="translate(637 496)"/><use href="#stitchNode" transform="translate(892 496)"/>
  </g>
</svg>
