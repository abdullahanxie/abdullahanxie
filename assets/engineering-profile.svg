<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Abdullah Hussain — Creative AI Engineer and Filmmaker</title>
  <desc id="desc">A flat-color ornamental composition combining Islamic geometry, cinema, circuitry, artificial intelligence, code, and three-dimensional design.</desc>
  <defs>
    <pattern id="lattice" width="72" height="72" patternUnits="userSpaceOnUse">
      <path d="M36 2 70 36 36 70 2 36Z M36 17 55 36 36 55 17 36Z" fill="none" stroke="#1d4f59" stroke-width="1"/>
      <circle cx="36" cy="36" r="3" fill="#c89b3c"/>
    </pattern>
    <pattern id="film" width="36" height="18" patternUnits="userSpaceOnUse">
      <rect x="4" y="4" width="12" height="7" rx="1" fill="#e8d9b5"/>
      <rect x="21" y="4" width="12" height="7" rx="1" fill="#e8d9b5"/>
    </pattern>
    <g id="star">
      <path d="M0-34 10-14 34-14 16 2 22 27 0 15-22 27-16 2-34-14-10-14Z" fill="#c89b3c" stroke="#e8d9b5" stroke-width="2"/>
      <path d="M0-20 7-7 20 0 7 7 0 20-7 7-20 0-7-7Z" fill="#163f73"/>
      <circle r="5" fill="#df6548"/>
    </g>
    <g id="node">
      <circle r="7" fill="#0b1726" stroke="#e6b84f" stroke-width="2"/>
      <circle r="2.5" fill="#56c7bc"/>
    </g>
    <g id="leaf">
      <path d="M0 0C24-19 42-12 50 3 29 15 12 13 0 0Z" fill="#1c776e" stroke="#e6b84f" stroke-width="2"/>
      <path d="M5 1C21 1 32 3 44 4" fill="none" stroke="#e8d9b5" stroke-width="1"/>
    </g>
  </defs>

  <rect width="1200" height="620" fill="#07111f"/>
  <rect x="16" y="16" width="1168" height="588" rx="8" fill="none" stroke="#c89b3c" stroke-width="3"/>
  <rect x="28" y="28" width="1144" height="564" rx="4" fill="none" stroke="#1c776e" stroke-width="1"/>
  <rect x="31" y="31" width="1138" height="558" fill="url(#lattice)" opacity=".22"/>

  <!-- Film-strip cornice -->
  <rect x="35" y="38" width="1130" height="18" fill="#132c3c"/>
  <rect x="35" y="38" width="1130" height="18" fill="url(#film)"/>
  <rect x="35" y="564" width="1130" height="18" fill="#132c3c"/>
  <rect x="35" y="564" width="1130" height="18" fill="url(#film)"/>

  <!-- Architectural arches -->
  <path d="M95 515V215C95 114 176 68 270 68s175 46 175 147v300" fill="#0d2231" stroke="#c89b3c" stroke-width="3"/>
  <path d="M129 515V225c0-76 61-123 141-123s141 47 141 123v290" fill="#0a1828" stroke="#1c776e" stroke-width="2"/>
  <path d="M755 515V215c0-101 81-147 175-147s175 46 175 147v300" fill="#0d2231" stroke="#c89b3c" stroke-width="3"/>
  <path d="M789 515V225c0-76 61-123 141-123s141 47 141 123v290" fill="#0a1828" stroke="#1c776e" stroke-width="2"/>

  <!-- Left: cinema -->
  <g transform="translate(270 250)">
    <circle r="105" fill="#102f43" stroke="#e6b84f" stroke-width="3"/>
    <circle r="79" fill="#091420" stroke="#df6548" stroke-width="2"/>
    <g fill="#1c776e" stroke="#e8d9b5" stroke-width="1.5">
      <path d="M0 0 0-68C35-68 56-49 65-25Z"/>
      <path d="M0 0 65-25C76 8 66 35 44 52Z"/>
      <path d="M0 0 44 52C17 73-15 74-43 53Z"/>
      <path d="M0 0-43 53C-68 31-76 2-65-26Z"/>
      <path d="M0 0-65-26C-54-54-31-68 0-68Z"/>
    </g>
    <circle r="19" fill="#df6548" stroke="#e6b84f" stroke-width="3"/>
    <circle r="7" fill="#07111f"/>
    <path d="M-120 132H120" stroke="#e6b84f" stroke-width="2"/>
    <text y="165" text-anchor="middle" fill="#e8d9b5" font-family="Georgia, serif" font-size="18" letter-spacing="4">FILM • COLOR • MOTION</text>
  </g>

  <!-- Right: spatial/code -->
  <g transform="translate(930 250)" fill="none">
    <path d="M0-93 86-44 86 52 0 102-86 52-86-44Z" stroke="#e6b84f" stroke-width="3"/>
    <path d="M0-93V7M86-44 0 7-86-44M0 7v95" stroke="#56c7bc" stroke-width="2"/>
    <path d="M-55-26-5-55 48-25 48 32-5 63-55 33Z" stroke="#df6548" stroke-width="2"/>
    <path d="M-5-55V5M48-25-5 5-55-26M-5 5v58" stroke="#e8d9b5" stroke-width="1.5"/>
    <text x="-112" y="-123" fill="#56c7bc" font-family="'Courier New', monospace" font-size="13">mesh.draw()</text>
    <text x="25" y="133" fill="#56c7bc" font-family="'Courier New', monospace" font-size="13">form + logic</text>
    <path d="M-120 132H120" stroke="#e6b84f" stroke-width="2"/>
    <text y="165" text-anchor="middle" fill="#e8d9b5" font-family="Georgia, serif" font-size="18" letter-spacing="4">AI • CODE • 3D FORM</text>
  </g>

  <!-- Center medallion -->
  <g transform="translate(600 258)">
    <circle r="142" fill="#07111f" stroke="#c89b3c" stroke-width="3"/>
    <circle r="130" fill="#102f43" stroke="#1c776e" stroke-width="2"/>
    <path d="M0-121 32-77 85-85 77-32 121 0 77 32 85 85 32 77 0 121-32 77-85 85-77 32-121 0-77-32-85-85-32-77Z" fill="#163f73" stroke="#e6b84f" stroke-width="3"/>
    <path d="M0-84 21-51 59-59 51-21 84 0 51 21 59 59 21 51 0 84-21 51-59 59-51 21-84 0-51-21-59-59-21-51Z" fill="#0a1828" stroke="#df6548" stroke-width="2"/>
    <circle r="46" fill="#1c776e" stroke="#e8d9b5" stroke-width="2"/>
    <circle r="29" fill="#07111f" stroke="#e6b84f" stroke-width="2"/>
    <path d="M-15 5 0-13 15 5M-12 12H12" fill="none" stroke="#56c7bc" stroke-width="4" stroke-linecap="round"/>
    <use href="#star" transform="translate(0 -116) scale(.55)"/>
    <use href="#star" transform="translate(116 0) scale(.55)"/>
    <use href="#star" transform="translate(0 116) scale(.55)"/>
    <use href="#star" transform="translate(-116 0) scale(.55)"/>
  </g>

  <!-- Circuit vines -->
  <g fill="none" stroke="#56c7bc" stroke-width="2">
    <path d="M45 120H78V90H165V118H205"/>
    <path d="M995 118h45V90h82v30h43"/>
    <path d="M45 490h62v-30h64v26h42"/>
    <path d="M989 486h45v-27h75v30h56"/>
    <path d="M445 250h25v-62h36"/>
    <path d="M755 250h-25v-62h-36"/>
    <path d="M445 340h38v64h40"/>
    <path d="M755 340h-38v64h-40"/>
  </g>
  <g>
    <use href="#node" transform="translate(78 120)"/>
    <use href="#node" transform="translate(165 90)"/>
    <use href="#node" transform="translate(1040 118)"/>
    <use href="#node" transform="translate(1122 90)"/>
    <use href="#node" transform="translate(107 490)"/>
    <use href="#node" transform="translate(171 460)"/>
    <use href="#node" transform="translate(1034 486)"/>
    <use href="#node" transform="translate(1109 459)"/>
    <use href="#node" transform="translate(470 250)"/>
    <use href="#node" transform="translate(730 250)"/>
    <use href="#node" transform="translate(483 340)"/>
    <use href="#node" transform="translate(717 340)"/>
  </g>

  <!-- Floral circuitry -->
  <g>
    <use href="#leaf" transform="translate(49 145) rotate(20) scale(.7)"/>
    <use href="#leaf" transform="translate(1120 145) rotate(160) scale(.7)"/>
    <use href="#leaf" transform="translate(49 435) rotate(-20) scale(.7)"/>
    <use href="#leaf" transform="translate(1120 435) rotate(200) scale(.7)"/>
  </g>

  <!-- Identity cartouche -->
  <rect x="365" y="58" width="470" height="76" rx="38" fill="#07111f" stroke="#e6b84f" stroke-width="3"/>
  <path d="M386 96h-52M814 96h52" stroke="#df6548" stroke-width="3"/>
  <text x="600" y="90" text-anchor="middle" fill="#e8d9b5" font-family="Georgia, serif" font-weight="700" font-size="27" letter-spacing="5">ABDULLAH HUSSAIN</text>
  <text x="600" y="116" text-anchor="middle" fill="#56c7bc" font-family="'Courier New', monospace" font-size="12" letter-spacing="2">CREATIVE AI ENGINEER • FILMMAKER • 3D DESIGNER</text>

  <!-- Bottom statement -->
  <rect x="346" y="483" width="508" height="54" rx="5" fill="#07111f" stroke="#1c776e" stroke-width="2"/>
  <text x="600" y="507" text-anchor="middle" fill="#e6b84f" font-family="Georgia, serif" font-size="18" letter-spacing="2">ENGINEERING IMAGES, SPACES &amp; INTELLIGENT EXPERIENCES</text>
  <text x="600" y="527" text-anchor="middle" fill="#e8d9b5" font-family="'Courier New', monospace" font-size="10" letter-spacing="3">VISUAL INSTINCT / TECHNICAL DEPTH / CULTURAL IMAGINATION</text>
</svg>
