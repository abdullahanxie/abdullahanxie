<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <!-- Public banner: capabilities only. -->
  <title id="title">Abdullah Hussain</title>
  <desc id="desc">Abdullah Hussain, Creative AI Engineer.</desc>
  <defs>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#313831" stroke-width="1"/>
    </pattern>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d7ff45"/>
      <stop offset="1" stop-color="#59c3ff"/>
    </linearGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="1200" height="520" rx="24" fill="#0d0f0e"/>
  <rect width="1200" height="520" rx="24" fill="url(#grid)" opacity=".7"/>
  <circle cx="1010" cy="80" r="210" fill="#d7ff45" opacity=".07" filter="url(#soft)"/>
  <circle cx="165" cy="500" r="245" fill="#59c3ff" opacity=".08" filter="url(#soft)"/>

  <g font-family="'Courier New', monospace" font-size="13" fill="#8e918b" letter-spacing="2">
    <text x="48" y="48">ABDULLAH HUSSAIN / CREATIVE AI ENGINEER</text>
    <text x="1152" y="48" text-anchor="end" fill="#d7ff45">● SYSTEM ONLINE</text>
  </g>

  <g transform="translate(48 105)">
    <text font-family="Arial, sans-serif" font-weight="800" font-size="76" letter-spacing="-5" fill="#e8e2d7">
      <tspan x="0" y="0">IMAGINE CLEARLY.</tspan>
      <tspan x="0" y="78" fill="#d7ff45">BUILD BEAUTIFULLY.</tspan>
    </text>
    <text x="3" y="220" font-family="'Courier New', monospace" font-size="17" fill="#b5bab2">
      Creative technology for visual, spatial, and interactive ideas.
    </text>
  </g>

  <g transform="translate(48 390)" font-family="'Courier New', monospace">
    <g>
      <rect width="225" height="76" rx="8" fill="#151816" stroke="#596158"/>
      <text x="18" y="29" font-size="12" fill="#8e918b">CAPABILITY / 01</text>
      <text x="18" y="55" font-size="18" fill="#e8e2d7">CREATIVE AI</text>
    </g>
    <g transform="translate(307)">
      <rect width="225" height="76" rx="8" fill="#151816" stroke="#596158"/>
      <text x="18" y="29" font-size="12" fill="#8e918b">CAPABILITY / 02</text>
      <text x="18" y="55" font-size="18" fill="#e8e2d7">3D DESIGN</text>
    </g>
    <g transform="translate(614)">
      <rect width="225" height="76" rx="8" fill="#151816" stroke="#596158"/>
      <text x="18" y="29" font-size="12" fill="#8e918b">CAPABILITY / 03</text>
      <text x="18" y="55" font-size="18" fill="#e8e2d7">ENGINEERING DESIGN</text>
    </g>
    <g transform="translate(921)">
      <rect width="183" height="76" rx="8" fill="url(#glow)"/>
      <text x="18" y="29" font-size="12" fill="#132015">CAPABILITY / 04</text>
      <text x="18" y="55" font-size="18" font-weight="700" fill="#0d0f0e">VISUAL SYSTEMS</text>
    </g>
  </g>

  <rect x="1" y="1" width="1198" height="518" rx="23" fill="none" stroke="#454d44" stroke-width="2"/>
</svg>
